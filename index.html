<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Cards</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="page">
    <img class="background-picture" src="images/background-dandelions.png" alt="">
    <h1 class="main-title">Выбери свой продукт</h1>

    <div class="product-card-container">
    </div>
  </div>

  <template id="product-template">
    <div class="product-card">
      <img src="" class="product-card__img">
      <p class="product-card__for-skin"></p>
      <h2 class="product-card__title"></h2>
      <p class="product-card__description"></p>
      <span class="product-card__composition">Состав:</span>
      <ul class="product-card__composition-list">
      </ul>
      <div class="product-card__price">
        <span class="price-text">Цена</span>
        <span class="price"></span>
      </div>
    </div>
  </template>

  <footer class="footer">
    <div class="footer__container">
      <div class="footer__info-block">
        <h3 class="footer__title">Product Cards</h3>
        <p class="footer__description">У нас самые лучшие продукты для кожи!</p>
        <div class="footer__socails">
          <img class="telegram-social" src="images/tg-image.svg" alt="">
          <img class="vk-social" src="images/vk-image.svg" alt="">
        </div>
      </div>

      <div class="footer__subscribe">
        <form class="footer__form" action="">
          <label class="footer__label" for="email-form">Подпишись на наши акции:</label>
          <div class="input-group">
            <input type="email" id="email-form" name="userEmail" placeholder="Введи Email..." required>
            <span class="span"></span>
            <button class="subscribe-button">Подписаться</button>
          </div>
        </form>
        <hr class="line">
        <p class="contact-link">www.product-cards.com©all right reserve</p>
      </div>

      <nav class="footer__nav">
        <h3 class="footer__nav-title">Быстрые ссылки</h3>
        <ul class="footer__nav-list">
          <a href="">Главная</a>
          <a href="">Магазин</a>
          <a href="">Контакты</a>
        </ul>
      </nav>
    </div>
  </footer>

  <div class="overlay" id="js-overlay"></div>

  <button class="register-button" id="js-register-button">Регистрация</button>

  <div class="modal" id="js-modal">
    <div class="modal__container">

      <h2 class="register-title">Регистрация</h2>

      <button class="close-button" id="js-close-button">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M15 5L5 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          <path d="M5 5L15 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </button>

      <hr class="modal-divider">

      <form class="register-form" id="js-register-form">
        <label class="modal__label">
          Имя:
          <input type="text" name="name" id="name-form" class="input-form" placeholder="Введите свое имя" required>
        </label>

        <label class="modal__label">
          Фамилия:
          <input type="text" name="surname" id="surname-form" class="input-form" placeholder="Введите свою фамилию"
            required>
        </label>

        <label class="modal__label">
          Дата рождения:
          <input type="date" name="date" id="date-form" class="input-form" required>
        </label>

        <label class="modal__label">
          Логин:
          <input type="text" name="login" id="login-form" class="input-form" placeholder="Введите свой логин" required>
        </label>

        <label class="modal__label">
          Пароль:
          <input type="password" name="password" id="password-form" class="input-form" placeholder="Введите свой пароль"
            required>
        </label>

        <label class="modal__label">
          Повторение пароля:
          <input type="password" name="repeatPassword" id="repaet-ps-form" class="input-form"
            placeholder="Повторите свой пароль" required>
        </label>

        <button class="complete-register-button" id="js-complete-register-button">Зарегестрироваться</button>
      </form>
    </div>
  </div>

  <script src="homework-5.js"></script>
  <script src="homework-6.js"></script>
  <script src="homework-7.js" type="module"></script>
  <script src="homework-08.js" type="module"></script>
  <script src="homework-9.js"></script>
</body>

</html>
